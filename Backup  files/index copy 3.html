<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FleetSignal</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0072ff">

<style>
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(180deg,#eef4ff,#f7f9fc);
}

/* HEADER */
.header {
  text-align:center;
  padding:20px;
  font-weight:600;
  font-size:22px;
  background:linear-gradient(90deg,#0072ff,#00c6ff);
  color:white;
}

/* HERO */
.hero {
  text-align:center;
  padding:50px 20px;
}

/* =========================
   PREVIEW CARD (FINAL)
========================= */

.preview {
  max-width: 320px;
  margin: 0 auto 20px;
  border-radius: 24px;
  overflow: hidden;
  height: 220px;

  /* glass effect */
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);

  /* shadow */
  box-shadow: 0 25px 60px rgba(0, 0, 0, 0.12);

  /* needed for glow */
  position: relative;
}

/* 🔵 SOFT GLOW BEHIND */
.preview::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, rgba(0,120,255,0.15), transparent 70%);
  z-index: 0;
}

/* IMAGE BASE STATE */
.preview img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: transparent;

  position: relative;
  z-index: 1;

  opacity: 0;
  transform: scale(0.92);

  transition: opacity 0.6s ease 0.2s, transform 0.6s ease;
}

/* IMAGE LOADED STATE */
.preview img.loaded {
  opacity: 1;
  transform: scale(1);

  /* 🚀 FLOATING EFFECT */
  animation: float 4s ease-in-out infinite;
}

/* 🎯 FLOAT ANIMATION */
@keyframes float {
  0% { transform: translateY(0px) scale(1); }
  50% { transform: translateY(-8px) scale(1); }
  100% { transform: translateY(0px) scale(1); }
}

/* TEXT */
h1 {
  font-size:32px;
  margin-top:30px;
}

p {
  opacity:0.6;
  max-width:420px;
  margin:10px auto 30px;
}

/* BUTTON */
.cta {
  display:inline-block;
  padding:14px 28px;
  border-radius:14px;
  background:linear-gradient(90deg,#00c6ff,#0072ff);
  color:white;
  font-weight:bold;
  text-decoration:none;
  box-shadow:0 10px 25px rgba(0,120,255,0.3);
  transition:0.2s;
}

.cta:hover {
  transform:translateY(-2px);
}

/* FEATURES */
.features {
  max-width:520px;
  margin:40px auto;
  padding:0 20px;
}

.feature {
  background:rgba(255,255,255,0.8);
  backdrop-filter:blur(12px);
  border-radius:18px;
  padding:18px;
  margin-bottom:14px;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
  transition:0.3s;
}

.feature:hover {
  transform:translateY(-3px);
}

/* ANIMATION */
@keyframes fadeUp {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="header">🚗 FleetSignal</div>

<div class="hero">

  <div class="preview">
    <img src="fleet-visual.png?v=2">
  </div>

  <h1>Never Miss an MOT Again</h1>

  <p>Track MOT, tax and vehicle status in seconds.</p>

  <a href="app.html" class="cta">Open Dashboard</a>

</div>

<div class="features">
  <div class="feature"><strong>✅ Instant MOT Checks</strong><br>Live DVLA data instantly.</div>
  <div class="feature"><strong>🚗 Track Vehicles</strong><br>All vehicles in one place.</div>
  <div class="feature"><strong>🔔 Smart Alerts</strong><br>Never miss expiry again.</div>
  <div class="feature"><strong>📱 App Experience</strong><br>Add to home screen.</div>
</div>

<script>
document.querySelectorAll('.preview img').forEach(img => {
  if (img.complete) {
    setTimeout(() => img.classList.add('loaded'), 150);
  } else {
    img.onload = () => {
      setTimeout(() => img.classList.add('loaded'), 150);
    };
  }
});
</script>

</body>
</html>
