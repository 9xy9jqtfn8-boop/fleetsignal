<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FleetSignal</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

  <!-- =========================
       TOP BAR
  ========================== -->
  <div class="top-bar">
    <div class="top-left">
      <span class="logo-mark">🚗</span>
      <span class="logo-text">FleetSignal</span>
    </div>

    <div class="top-right">
      <span id="headerPlanBadge" class="badge free"></span>
      <button id="logoutBtn" class="logout-btn" type="button">Logout</button>
    </div>
  </div>

  <!-- =========================
       LOGIN
  ========================== -->
  <div id="authBox" class="container">
    <div class="card auth-card">
      <h2>Login</h2>

      <input id="email" type="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Password" />

      <button id="loginBtn" class="primary-btn" type="button">Login</button>
      <button id="signupBtn" class="secondary-btn" type="button">Sign Up</button>

      <p class="helper-text">
        <a href="#" id="forgotPasswordLink">Forgot password?</a>
      </p>

      <p id="authMessage" class="message"></p>
    </div>
  </div>

  <!-- =========================
       DASHBOARD
  ========================== -->
  <div id="dashboardBox" class="container hidden">

    <!-- =========================
         MAIN DASHBOARD CARD
    ========================== -->
    <div class="card dashboard-card">
      <h1>🚗 Fleet Dashboard</h1>

      <!-- =========================
           USER BAR
      ========================== -->
      <div class="user-bar">
        <div class="user-bar-left">
          <div class="user-bar-label">Signed in as</div>
          <div id="dashboardUserEmail" class="dashboard-user-email"></div>
        </div>

        <div class="user-bar-right">
          <span id="dashboardPlanBadge" class="badge free"></span>
        </div>
      </div>

      <!-- =========================
           VEHICLE CHECK FORM
      ========================== -->
      <input id="regInput" type="text" placeholder="Registration" />
      <input id="alertEmailInput" type="email" placeholder="Email for MOT alerts" />

      <div class="alert-toggle-row">
        <label class="switch">
          <input type="checkbox" id="alertsToggle" />
          <span class="slider"></span>
        </label>
        <span id="alertsLabel">Alerts OFF</span>
      </div>

      <button id="checkBtn" class="primary-btn" type="button">Check Vehicle</button>

      <input id="vehicleNameInput" type="text" placeholder="Vehicle name (optional)" />
      <input id="vehicleTypeInput" type="text" placeholder="Type (Car / Van / etc)" />
      <input id="vehicleColourInput" type="text" placeholder="Colour" />
      <input id="insuranceInput" type="text" placeholder="Insurance Expiry (YYYY-MM-DD)" />

      <!-- =========================
           RESULT BOX
      ========================== -->
      <div id="resultBox" class="result-box"></div>

      <!-- =========================
           UPGRADE BOX
      ========================== -->
      <div class="upgrade-box">
        <p><strong>Never miss an MOT again</strong></p>
        <a href="https://buy.stripe.com/test_eVq6oI75SbNK42W1kE0Jq01" class="upgrade-btn">
          Upgrade to Premium
        </a>
      </div>
    </div>

    <!-- =========================
         VEHICLE LIST
    ========================== -->
    <div class="card vehicle-list-card">
      <h3>Your Vehicles:</h3>
      <div id="vehicleList"></div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
