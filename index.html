<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FleetSignal</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0072ff">

<style>
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(180deg,#eef4ff,#f7f9fc);
}

/* HEADER */
.header {
  text-align:center;
  padding:20px;
  font-weight:600;
  font-size:22px;
  background:linear-gradient(90deg,#0072ff,#00c6ff);
  color:white;
}

/* HERO */
.hero {
  text-align:center;
  padding:50px 20px;
}

/* PREVIEW CARD */
.preview {
  max-width:360px;
  margin:auto;
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 30px 80px rgba(0,0,0,0.15);
  backdrop-filter:blur(20px);
  animation:fadeUp 0.8s ease;
}

.preview img {
  width:100%;
}

/* TEXT */
h1 {
  font-size:32px;
  margin-top:30px;
}

p {
  opacity:0.6;
  max-width:420px;
  margin:10px auto 30px;
}

/* BUTTON */
.cta {
  display:inline-block;
  padding:14px 28px;
  border-radius:14px;
  background:linear-gradient(90deg,#00c6ff,#0072ff);
  color:white;
  font-weight:bold;
  text-decoration:none;
  box-shadow:0 10px 25px rgba(0,120,255,0.3);
  transition:0.2s;
}

.cta:hover {
  transform:translateY(-2px);
}

/* FEATURES */
.features {
  max-width:520px;
  margin:40px auto;
  padding:0 20px;
}

.feature {
  background:rgba(255,255,255,0.8);
  backdrop-filter:blur(12px);
  border-radius:18px;
  padding:18px;
  margin-bottom:14px;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
  transition:0.3s;
}

.feature:hover {
  transform:translateY(-3px);
}

/* ANIMATION */
@keyframes fadeUp {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="header">🚗 FleetSignal</div>

<div class="hero">

  <div class="preview">
    <img src="/fleet-visual.png">
  </div>

  <h1>Never Miss an MOT Again</h1>

  <p>Track MOT, tax and vehicle status in seconds.</p>

  <a href="/app.html" class="cta">Open Dashboard</a>

</div>

<div class="features">
  <div class="feature"><strong>✅ Instant MOT Checks</strong><br>Live DVLA data instantly.</div>
  <div class="feature"><strong>🚗 Track Vehicles</strong><br>All vehicles in one place.</div>
  <div class="feature"><strong>🔔 Smart Alerts</strong><br>Never miss expiry again.</div>
  <div class="feature"><strong>📱 App Experience</strong><br>Add to home screen.</div>
</div>

</body>
</html>
