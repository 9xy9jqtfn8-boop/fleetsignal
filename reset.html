<<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password - FleetSignal</title>

  <link rel="stylesheet" href="style.css" />

  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#22c55e" />

  <!-- IOS -->
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

</head>

<body>

  <div class="header">🚗 FleetSignal</div>

  <div class="container">
    <div class="card">
      <h2>Reset Password</h2>

      <input id="newPassword" type="password" placeholder="Enter new password" />

      <button onclick="updatePassword()" class="primary-btn">
        Update Password
      </button>

      <p id="resetMessage"></p>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://bufhopdljmpaerrvigay.supabase.co";
    const SUPABASE_KEY = "sb_publishable_syvITTAJPgDewBp19skDkQ_TGnU6u7d";

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function updatePassword() {
      const newPassword = document.getElementById("newPassword").value;
      const resetMessage = document.getElementById("resetMessage");

      if (!newPassword) {
        resetMessage.innerText = "Enter a new password.";
        return;
      }

      const { error } = await client.auth.updateUser({
        password: newPassword
      });

      if (error) {
        resetMessage.innerText = error.message;
      } else {
        resetMessage.innerText = "Password updated. You can now log in.";
      }
    }
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js")
        .then(() => console.log("SW registered"));
    }
  </script>

</body>
</html>
