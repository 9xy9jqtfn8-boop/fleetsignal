<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FleetSignal</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>
  <div class="header">🚗 FleetSignal</div>

  <!-- LOGIN -->
  <div id="authBox" class="container">
    <div class="card">
      <h2>Login</h2>

      <input id="email" type="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Password" />

      <button id="loginBtn" class="primary-btn">Login</button>
      <button id="signupBtn" class="secondary-btn">Sign Up</button>

      <p id="authMessage" class="message"></p>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboardBox" class="container hidden">
    <div class="card">
      <h1>🚗 Fleet Dashboard</h1>

      <input id="regInput" type="text" placeholder="Registration" />
      <input id="vehicleNameInput" type="text" placeholder="Vehicle name (optional)" />
      <input id="vehicleTypeInput" type="text" placeholder="Type (Car / Van / etc)" />
      <input id="vehicleColorInput" type="text" placeholder="Colour" />
      <input id="alertEmailInput" type="email" placeholder="Email for MOT alerts" />

      <button id="checkBtn" class="primary-btn">Check Vehicle</button>

      <div id="resultBox" class="result-box"></div>

      <h2>Your Vehicles:</h2>
      <div id="vehicleList"></div>

      <button id="logoutBtn" class="logout-btn">Logout</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
