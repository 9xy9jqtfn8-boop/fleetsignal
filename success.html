<!DOCTYPE html>
<html>
<head>
  <title>Activating Premium...</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body style="font-family: Arial; text-align: center; padding-top: 50px;">

  <h2>✅ Payment successful</h2>
  <p>Activating your premium account...</p>

  <script>
    const SUPABASE_URL = "https://bufhopdljmpaerrvigay.supabase.co";
    const SUPABASE_KEY = "sb_publishable_syvITTAJPgDewBp19skDkQ_TGnU6u7d";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function activatePremium() {
      const { data: { user } } = await client.auth.getUser();

      if (!user) {
        window.location.href = "/app.html";
        return;
      }

      await fetch("/api/activate-premium", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          userId: user.id
        })
      });

      window.location.href = "/app.html";
    }

    activatePremium();
  </script>

</body>
</html>
